  .grade-intro-text{font-size:13px;color:#444;line-height:1.6;}
  .unit-list{display:flex;flex-direction:column;gap:6px;}
  .unit-btn{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:left;}
  .unit-btn:hover{background:#f0faf5;}
  .unit-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;min-width:52px;text-align:center;line-height:1.6;}
  .tag-unit{background:#1D9E75;color:#fff;}
  .tag-grammar{background:#A32D2D;color:#fff;}
  .tag-stage{background:#185FA5;color:#fff;}
  .tag-smalltalk{background:#854F0B;color:#fff;}
  .unit-title-text{font-size:13px;color:#333;flex:1;}
  .count-badge{font-size:11px;background:#eee;color:#666;border-radius:10px;padding:1px 8px;white-space:nowrap;}
  .empty-badge{font-size:11px;background:#fff3cd;color:#856404;border-radius:10px;padding:1px 8px;white-space:nowrap;}
  .back-btn{font-size:12px;color:#185FA5;background:none;border:none;cursor:pointer;padding:0 0 10px;display:block;}
  .unit-header{font-size:15px;font-weight:500;color:#333;margin-bottom:10px;}
  .ctrl-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .ctrl-btn{background:#fff;border:1px solid #ccc;border-radius:7px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:500;color:#333;}
  .ctrl-btn:hover{background:#f0f0f0;}
  .ctrl-btn.active{border-color:#378ADD;color:#185FA5;background:#e8f0fb;}
  .search-box{padding:6px 10px;font-size:13px;border:1px solid #ccc;border-radius:7px;width:100%;margin-bottom:8px;}
  .search-box:focus{outline:none;border-color:#1D9E75;}
  .legend{font-size:11px;color:#888;margin-bottom:8px;}
  .legend span{color:#E24B4A;font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{padding:7px 10px;text-align:left;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #eee;background:#f8f9fa;}
  td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle;}
  tr:hover td{background:#f0faf5;}
  .accent{color:#E24B4A;font-weight:700;text-decoration:underline;text-decoration-color:#E24B4A;text-underline-offset:2px;}
  .tip{font-size:11px;background:#e8f0fb;color:#185FA5;border-radius:4px;padding:1px 6px;display:inline-block;margin-top:2px;}
  .speak-btn{background:#fff;border:1px solid #ccc;border-radius:5px;padding:3px 7px;cursor:pointer;font-size:13px;color:#555;}
  .speak-btn:hover{background:#f0f0f0;}
  .speak-btn.playing{background:#e8f0fb;border-color:#378ADD;}
  .empty-msg{text-align:center;padding:24px;font-size:13px;color:#888;background:#f8f9fa;border-radius:8px;border:1px dashed #ddd;}
  #wordView{display:none;}
  .ans-cell{min-width:80px;}
  .ans-hidden{filter:blur(4px);user-select:none;cursor:pointer;transition:filter 0.2s;}
  tr.row-even td{background:#f0faf5;}
  tr.row-odd td{background:#fff;}
  tr.row-even:hover td{background:#d8f0e8;}
  tr.row-odd:hover td{background:#e8f8f0;}
  tr.row-miss td{background:#fff0f0 !important;}
  tr.row-ok td{background:#f0fff4 !important;opacity:0.6;}
  .check-btn{border:none;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:13px;font-weight:700;margin-left:2px;}
  .ok-btn{background:#d4edda;color:#155724;}
  .ok-btn:hover{background:#c3e6cb;}
  .miss-btn{background:#f8d7da;color:#721c24;}
  .miss-btn:hover{background:#f5c6cb;}
  .retry-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center;font-size:12px;color:#888;}
  .retry-btn{background:#fff;border:1px solid #E24B4A;border-radius:7px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:500;color:#E24B4A;}
  .retry-btn:hover{background:#fff0f0;}
  .score-badge{font-size:12px;font-weight:500;padding:2px 10px;border-radius:10px;background:#e8f0fb;color:#185FA5;}
  .ans-hidden:hover{filter:blur(2px);}
  .ans-visible{filter:none;transition:filter 0.2s;}
  .toggle-ans-btn{background:#fff;border:1px solid #ccc;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px;color:#555;white-space:nowrap;}
  .toggle-ans-btn:hover{background:#f0faf5;border-color:#1D9E75;color:#1D9E75;}
  .all-ans-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center;font-size:12px;color:#888;}
  .all-ans-btn{background:#fff;border:1px solid #1D9E75;border-radius:7px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:500;color:#1D9E75;}
  .all-ans-btn:hover{background:#f0faf5;}
  #noResult{display:none;text-align:center;padding:16px;font-size:13px;color:#888;}

</head>

function selectGrade(g,btn){
  currentGrade=g;
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showUnitView();
}

function renderUnits(g){
  const ul=document.getElementById('unitList');
  ul.innerHTML='';
  document.getElementById('gradeLabel').textContent=db[g].label+' の単元一覧';
  const gi=document.getElementById('gradeIntro');
  // imgs defined globally
  gi.innerHTML='<img src="'+COVER_IMGS[g]+'" alt="'+db[g].label+'" style="width:56px;height:72px;object-fit:cover;border-radius:4px;border:1px solid #ccc;">'
    +'<div class="grade-intro-text"><strong>'+db[g].label+'</strong><br>NEW HORIZON English Course<br>各単元をタップして単語を学習できます。</div>';
  db[g].units.forEach((u,i)=>{
    const btn=document.createElement('button');
    btn.className='unit-btn';
    let tc='tag-unit';
    if(u.tag==='grammar') tc='tag-grammar';
    else if(u.tag==='stage') tc='tag-stage';
    else if(u.tag==='smalltalk') tc='tag-smalltalk';
    const badge=u.words.length>0
      ?`<span class="count-badge">${u.words.length}語</span>`
      :`<span class="empty-badge">準備中</span>`;
    btn.innerHTML=`<span class="unit-tag ${tc}">${u.label}</span><span class="unit-title-text">${u.title}</span>${badge}`;
    btn.onclick=()=>openUnit(g,i);
    ul.appendChild(btn);
  });
}

function toggleAns(i){
  const el=document.getElementById('ans-'+i);
  if(!el)return;
  el.classList.toggle('ans-hidden');
  el.classList.toggle('ans-visible');
  const btn=document.getElementById('abtn-'+i);
  if(btn) btn.textContent=el.classList.contains('ans-visible')?'隠す':'見る';
}
function showAllAns(){
  document.querySelectorAll('.ans-hidden').forEach(el=>{
    el.classList.remove('ans-hidden');el.classList.add('ans-visible');
  });
  document.querySelectorAll('.toggle-ans-btn').forEach(btn=>btn.textContent='隠す');
}
function hideAllAns(){
  document.querySelectorAll('.ans-visible').forEach(el=>{
    el.classList.remove('ans-visible');el.classList.add('ans-hidden');
  });
  document.querySelectorAll('.toggle-ans-btn').forEach(btn=>btn.textContent='見る');
}

let missedIndices=[];

function markOk(i){
  const tr=document.getElementById('row-'+i);
  if(!tr)return;
  tr.classList.remove('row-miss');
  tr.classList.add('row-ok');
  missedIndices=missedIndices.filter(x=>x!==i);
  updateScore();
}
function markMiss(i){
  const tr=document.getElementById('row-'+i);
  if(!tr)return;
  tr.classList.remove('row-ok');
  tr.classList.add('row-miss');
  if(!missedIndices.includes(i)) missedIndices.push(i);
  updateScore();
}
function updateScore(){
  const total=currentWords.length;
  const ok=document.querySelectorAll('tr.row-ok').length;
  const miss=document.querySelectorAll('tr.row-miss').length;
  const sb=document.getElementById('scoreBadge');
  if(sb) sb.textContent='✅ '+ok+' / ❌ '+miss+' / 全'+total+'問';
}
function retryMissed(){
  if(missedIndices.length===0){alert('ミスした問題がありません！全問正解です🎉');return;}
  const saved=currentWords;
  currentWords=missedIndices.map(i=>saved[i]);
  filtered=currentWords.map((_,j)=>j);
  missedIndices=[];
  const isGrammar=document.getElementById('unitHeader').textContent.includes('文法');
  renderRows(isGrammar);
  updateScore();
  const sb=document.getElementById('scoreBadge');
  if(sb) sb.textContent='🔁 ミス問題のみ '+currentWords.length+'問';
}
function resetCheck(){
  missedIndices=[];
  document.querySelectorAll('tr.row-ok,tr.row-miss').forEach(tr=>{
    tr.classList.remove('row-ok','row-miss');
  });
  updateScore();
}

function openUnit(g,i){
  const u=db[g].units[i];
  currentWords=u.words;
  filtered=currentWords.map((_,j)=>j);
  missedIndices=[];
  const isGrammar=u.tag==='grammar';
  const unitLabel=isGrammar?'問':'語';
  document.getElementById('unitHeader').textContent=u.label+'：'+u.title+(u.words.length>0?' （'+u.words.length+unitLabel+'）':'');
  document.getElementById('unitView').style.display='none';
  document.getElementById('wordView').style.display='block';
  const wc=document.getElementById('wordContent');
  if(!currentWords.length){
    wc.innerHTML='<div class="empty-msg">この単元のデータはまだ準備中です。</div>';
    return;
  }
  const ansLabel=isGrammar?'答え':'日本語訳';
  const searchLabel=isGrammar?'🔍 検索...':'🔍 単語を検索...';
  const thead=isGrammar
    ?'<tr><th>#</th><th></th><th>問題</th><th class="ans-cell">答え</th><th>採点</th></tr>'
    :'<tr><th>#</th><th></th><th>英語・発音</th><th>日本語</th><th>採点</th></tr>';
  wc.innerHTML=`
    <div class="ctrl-bar">
      <button class="ctrl-btn" id="slowBtn" onclick="setSpeed(0.75)">ゆっくり</button>
      <button class="ctrl-btn active" id="normalBtn" onclick="setSpeed(1.0)">ふつう</button>
      <button class="ctrl-btn" onclick="speakAll()">▶ 全部聴く</button>
      <button class="ctrl-btn" onclick="stopAll()">■ 停止</button>
    </div>
    <div class="all-ans-bar">
      ${ansLabel}：
      <button class="all-ans-btn" onclick="showAllAns()">全部見せる</button>
      <button class="all-ans-btn" onclick="hideAllAns()">全部隠す</button>
    </div>
    <div class="retry-bar">
      <span id="scoreBadge" class="score-badge">採点結果がここに表示されます</span>
      <button class="retry-btn" onclick="retryMissed()">❌ ミスした問題だけやり直す</button>
      <button class="all-ans-btn" onclick="resetCheck()">リセット</button>
    </div>
    <input class="search-box" id="searchBox" placeholder="${searchLabel}" oninput="filterTable()">
    ${isGrammar?``:`<div class="legend"><span>赤下線</span>＝アクセント位置</div>`}
    <table>
      <thead>${thead}</thead>
      <tbody id="wordTable"></tbody>
    </table>
    <div id="noResult">一致する項目がありません</div>`;
  renderRows(isGrammar);
  filtered=currentWords.map((_,j)=>j);
  updateScore();
}

function renderRows(isGrammar){
  const tb=document.getElementById('wordTable');
  if(!tb)return;
  tb.innerHTML='';
  currentWords.forEach((w,i)=>{
    const tr=document.createElement('tr');
    tr.id='row-'+i;
    tr.className=i%2===0?'row-even':'row-odd';
    const safeEn=w.en.replace(/'/g,"\'");
    if(isGrammar){
      const isFill=w.type==='fill';
      const typeTag=isFill
        ?'<span style="font-size:10px;background:#fff3cd;color:#856404;border-radius:4px;padding:1px 6px;margin-right:4px;">穴埋め</span>'
        :'<span style="font-size:10px;background:#d4edda;color:#155724;border-radius:4px;padding:1px 6px;margin-right:4px;">日→英</span>';
      // For fill: show hint as context + blank sentence
      // For trans: show Japanese sentence
      const questionHtml=isFill
        ?'<div style="font-size:11px;color:#888;margin-bottom:2px;">'+w.hint+'</div>'
         +'<div style="font-size:13px;color:#333;font-weight:500;">'+w.ja+'</div>'
        :'<div style="font-size:13px;color:#333;">'+w.ja+'</div>';
      tr.innerHTML='<td style="color:#aaa;font-size:12px;">'+(i+1)+'</td>'
        +((/[぀-鿿]/.test(w.en))?'<td></td>':'<td><button class="speak-btn" data-wi="'+i+'" onclick="speakWord('+i+',this)">🔊</button></td>')
        +'<td>'+typeTag+questionHtml+'</td>'
        +'<td class="ans-cell">'
        +'<span id="ans-'+i+'" class="ans-hidden" onclick="toggleAns('+i+')" style="font-weight:600;font-size:13px;color:#1D9E75;display:inline-block;">'+w.en+'</span>'
        +' <button id="abtn-'+i+'" class="toggle-ans-btn" onclick="toggleAns('+i+')">見る</button>'
        +'</td>'
        +'<td><button class="check-btn ok-btn" onclick="markOk('+i+')">✅</button>'
        +'<button class="check-btn miss-btn" onclick="markMiss('+i+')">❌</button></td>';
    } else {
      tr.innerHTML='<td style="color:#aaa;font-size:12px;">'+(i+1)+'</td>'
        +((/[぀-鿿]/.test(w.en))?'<td></td>':'<td><button class="speak-btn" data-wi="'+i+'" onclick="speakWord('+i+',this)">🔊</button></td>')
        +'<td><span style="font-weight:600;font-size:14px;">'+w.en+'</span><br><span style="font-size:12px;color:#888;">'+w.kana+'</span><div class="tip">'+w.tip+'</div></td>'
        +'<td>'
        +'<span id="ans-'+i+'" class="ans-hidden" onclick="toggleAns('+i+')" style="font-size:12px;color:#555;display:inline-block;">'+w.ja+'</span>'
        +' <button id="abtn-'+i+'" class="toggle-ans-btn" onclick="toggleAns('+i+')">見る</button>'
        +'</td>'
        +'<td><button class="check-btn ok-btn" onclick="markOk('+i+')">✅</button>'
        +'<button class="check-btn miss-btn" onclick="markMiss('+i+')">❌</button></td>';
    }
    tb.appendChild(tr);
  });
}

function renderWords(){
  renderRows(false);
  filtered=currentWords.map((_,j)=>j);
}

function filterTable(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  filtered=[];let c=0;
  currentWords.forEach((w,i)=>{
    const r=document.getElementById('row-'+i);
    const m=!q||w.en.toLowerCase().includes(q)||(w.ja&&w.ja.includes(q));
    if(r)r.style.display=m?'':'none';
    if(m){filtered.push(i);c++;}
  });
  const nr=document.getElementById('noResult');
  if(nr)nr.style.display=c===0?'block':'none';
}

function showUnitView(){
  stopAll();
  document.getElementById('wordView').style.display='none';
  document.getElementById('unitView').style.display='block';
  renderUnits(currentGrade);
}

function setSpeed(s){
  speed=s;
  const sb=document.getElementById('slowBtn');
  const nb=document.getElementById('normalBtn');
  if(sb)sb.classList.toggle('active',s===0.75);
  if(nb)nb.classList.toggle('active',s===1.0);
}

function speakWord(i,btn){
  if(!currentWords[i])return;
  const text=currentWords[i].en;
  const hasJP=/[぀-鿿]/.test(text);
  if(hasJP)return;
  speakEnglish(text,btn);
}

function speakEnglish(text,btn){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('playing'));

  function doSpeak(voice){
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';
    u.rate=speed;
    u.volume=1.0;
    u.pitch=1.0;
    if(voice) u.voice=voice;
    if(btn){
      btn.classList.add('playing');
      u.onend=function(){btn.classList.remove('playing');};
    }
    window.speechSynthesis.speak(u);
  }

  const voices=window.speechSynthesis.getVoices();
  const enVoice=voices.find(v=>v.lang==='en-US')||voices.find(v=>v.lang.startsWith('en'));
  if(enVoice){
    doSpeak(enVoice);
  } else {
    window.speechSynthesis.onvoiceschanged=function(){
      const v2=window.speechSynthesis.getVoices();
      const en=v2.find(v=>v.lang==='en-US')||v2.find(v=>v.lang.startsWith('en'));
      doSpeak(en||null);
      window.speechSynthesis.onvoiceschanged=null;
    };
    // Chrome用：少し待ってから再試行
    setTimeout(function(){
      const v3=window.speechSynthesis.getVoices();
      const en=v3.find(v=>v.lang==='en-US')||v3.find(v=>v.lang.startsWith('en'));
      if(en) doSpeak(en);
    },300);
  }
}

function speak(text,btn){
  const hasJP=/[぀-鿿]/.test(text);
  if(hasJP)return;
  speakEnglish(text,btn);
}

function speakAll(){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(allTimer)clearTimeout(allTimer);
  allIdx=0;speakNext();
}

function speakNext(){
  if(allIdx>=filtered.length){allIdx=-1;return;}
  const wi=filtered[allIdx];
  const text=currentWords[wi].en;
  const hasJP=/[぀-鿿]/.test(text);
  if(hasJP){allIdx++;speakNext();return;}
  const btn=document.querySelector('[data-wi="'+wi+'"]');
  speakEnglish(text,btn);
  const dur=(text.split(' ').length*700/speed)+800;
  allTimer=setTimeout(()=>{allIdx++;speakNext();},dur);
}

function stopAll(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(allTimer)clearTimeout(allTimer);
  allIdx=-1;
  document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('playing'));
}

showUnitView();
</script>
</body>
</html>
